name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: football_analytics_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/football_analytics_test?schema=public
      NODE_ENV: test
      API_PREFIX: api/v1
      PORT: 3000
      CORS_ORIGIN: http://localhost:4200

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npx prisma generate

      - run: npx prisma db push

      - run: npm run test

      - run: npm run test:e2e

      - run: npm run build

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # package-lock.json fue generado con npm 11; npm 10 (la version que
      # trae Node 20 por defecto) lo considera desincronizado por las
      # optionalDependencies de @angular-devkit/core (chokidar 5).
      - run: npm install -g npm@11

      - run: npm ci

      - run: npm run lint

      - run: npm run test -- --watch=false --browsers=ChromeHeadless

      - run: npm run build

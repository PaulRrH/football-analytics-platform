services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: football_analytics
    ports:
      # Puerto 5433 en el host para no chocar con una instalacion local de
      # PostgreSQL que ya use el 5432. El backend se conecta internamente
      # via la red de Docker en el puerto 5432 (ver DATABASE_URL abajo).
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/football_analytics?schema=public
      NODE_ENV: development
      PORT: 3000
      API_PREFIX: api/v1
      CORS_ORIGIN: http://localhost:4200
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - '4200:80'
    depends_on:
      - backend

volumes:
  postgres_data:
